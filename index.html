<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة عصام صاصا - برمج عمر</title>
    <style>
        body { background: #0f0f0f; color: #00ff88; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 400px; box-shadow: 0 4px 10px rgba(0,255,136,0.1); }
        h1 { text-shadow: 0 0 10px #00ff88; }
        audio { width: 100%; margin-top: 10px; }
        .dev { font-size: 12px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>🎤 مكتبة المبرمج عمر (عصام صاصا)</h1>
    
    <div class="card">
        <h3>وسط دموع وجراح</h3>
        <audio controls src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Tours/Enthusiast/Tours_-_01_-_Enthusiast.mp3"></audio>
        <p style="font-size:10px; color:#555;">(ملاحظة: ده صوت تجريبي للتأكد من التشغيل)</p>
    </div>

    <div class="card">
        <h3>الأغاني الباقية</h3>
        <p>مبروك يا عمر! الموقع شغال، بس محتاجين روابط MP3 حقيقية لصاصا.</p>
    </div>

    <div class="dev">برمجت بواسطة عمر - 2026</div>
</body>
</html>
