<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة عصام صاصا - المبرمج عمر</title>
    <style>
        body { background: #0b0b0b; color: #00ff88; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; padding-bottom: 50px; }
        h1 { text-shadow: 0 0 20px #00ff88; font-size: 26px; margin-top: 20px; }
        .card { background: #161616; border: 1px solid #333; border-radius: 15px; padding: 15px; margin: 15px 0; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card:hover { border-color: #00ff88; transform: scale(1.02); }
        h3 { margin-bottom: 10px; color: #fff; font-size: 16px; }
        audio { width: 100%; margin-top: 5px; filter: hue-rotate(100deg); }
        .badge { background: #00ff88; color: #000; padding: 4px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 مـهـرجـانـات عـصـام صـاصـا</h1>

        <div class="card">
            <h3>🎵 وسط دموع وجراح</h3>
            <audio controls><source src="https://server1.mp3-3arb.com/s/36021.mp3" type="audio/mpeg"></audio>
        </div>

        <div class="card">
            <h3>🎵 قالو فلاتي واعداء كتير</h3>
            <audio controls><source src="https://server1.mp3-3arb.com/s/35123.mp3" type="audio/mpeg"></audio>
        </div>

        </div>

        <div class="card">
            <h3>🎵 لاف مي ولا منزلتوش من نظري</h3>
            <audio controls><source src="https://server1.mp3-3arb.com/s/34211.mp3" type="audio/mpeg"></audio>
        </div>

        <p style="color: #444; font-size: 11px; margin-top: 30px;">برمجت بواسطة عمر بذكاء اصطناعي 2026 ©</p>
    </div>
</body>
</html>
